# https://github.com/evilmartians/lefthook
# Order matters: format first (may change files), then lint, then mod-tidy-check.

pre-commit:
  parallel: false
  commands:
    format:
      glob: "*.go"
      run: make fmt
      stage_fixed: true
    lint:
      glob: "*.go"
      run: make lint
    mod-tidy-check:
      run: make mod-tidy-check

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}
