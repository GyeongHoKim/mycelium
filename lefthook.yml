# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.go"
      run: goimports -w {staged_files} && golines -w {staged_files}
      stage_fixed: true
    lint:
      glob: "*.go"
      run: golangci-lint run --fix {staged_files}
      stage_fixed: true
    mod-tidy:
      run: go mod tidy && git diff --exit-code go.mod go.sum

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}
